name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Trunk
        run: cargo binstall trunk --no-confirm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sidecar/requirements.txt

      - name: Cache Python sidecar binary
        id: sidecar-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/tbhd-sidecar-${{ matrix.target }}*
          key: sidecar-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('sidecar/**', 'scripts/build-sidecar.sh') }}

      - name: Build Python sidecar
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r sidecar/requirements.txt nuitka
          pushd sidecar
          python -m nuitka \
            --mode=onefile \
            --assume-yes-for-downloads \
            --output-dir=dist \
            --output-filename=tbhd-sidecar \
            --include-package=mitmproxy \
            --include-package=mitmproxy.tools \
            --include-data-files=addon.py=addon.py \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas \
            --follow-imports \
            main.py
          popd

          mkdir -p src-tauri/binaries
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp sidecar/dist/tbhd-sidecar.exe "src-tauri/binaries/tbhd-sidecar-${{ matrix.target }}.exe"
          else
            cp sidecar/dist/tbhd-sidecar "src-tauri/binaries/tbhd-sidecar-${{ matrix.target }}"
            chmod +x "src-tauri/binaries/tbhd-sidecar-${{ matrix.target }}"
          fi

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe

  publish:
    name: Publish GitHub release
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
