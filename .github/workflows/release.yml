name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  WINDIVERT_VERSION: 2.2.2

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Trunk
        run: cargo binstall trunk --no-confirm

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm

      - name: Stage Windows network helper
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          cargo build -p tbhdashboard-nethelper --release --target ${{ matrix.target }}
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item target/${{ matrix.target }}/release/tbhdashboard-nethelper.exe src-tauri/binaries/tbhdashboard-nethelper.exe -Force

          $zip = "WinDivert-$env:WINDIVERT_VERSION-A.zip"
          $url = "https://github.com/basil00/WinDivert/releases/download/v$env:WINDIVERT_VERSION/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath windivert -Force
          Copy-Item "windivert/WinDivert-$env:WINDIVERT_VERSION-A/x64/WinDivert.dll" src-tauri/binaries/WinDivert.dll -Force
          Copy-Item "windivert/WinDivert-$env:WINDIVERT_VERSION-A/x64/WinDivert64.sys" src-tauri/binaries/WinDivert64.sys -Force

          @(
            "src-tauri/binaries/tbhdashboard-nethelper.exe",
            "src-tauri/binaries/WinDivert.dll",
            "src-tauri/binaries/WinDivert64.sys"
          ) | ForEach-Object {
            if (!(Test-Path $_)) { throw "Missing required Windows bundle file: $_" }
          }

          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle | Add-Member -NotePropertyName resources -NotePropertyValue @(
            "binaries/tbhdashboard-nethelper.exe",
            "binaries/WinDivert.dll",
            "binaries/WinDivert64.sys"
          ) -Force
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_TOKEN: ${{ secrets.TAURI_UPDATER_TOKEN }}
        with:
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}
          uploadUpdaterJson: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}-${{ strategy.job-index }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            target/${{ matrix.target }}/release/bundle/macos/*.dmg
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            latest.json

  publish:
    name: Publish GitHub release
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Merge platform updater JSONs
        shell: bash
        run: |
          # Merge per-platform latest.json files into a single latest.json
          shopt -s nullglob
          jsons=(release-artifacts/*/latest.json)
          if [[ ${#jsons[@]} -eq 1 ]]; then
            cp "${jsons[0]}" latest.json
          elif [[ ${#jsons[@]} -gt 1 ]]; then
            jq -s '
              {
                version: .[0].version,
                notes: .[0].notes,
                pub_date: .[0].pub_date,
                platforms: (reduce .[].platforms as $p ({}; . * $p))
              }
            ' "${jsons[@]}" > latest.json
          fi

      - name: Flatten artifacts for release
        shell: bash
        run: |
          mkdir -p release-flat
          # Copy all files except per-platform latest.json into a flat dir
          find release-artifacts -type f ! -name latest.json -exec cp -n {} release-flat/ \;
          # Add merged latest.json instead
          if [[ -f latest.json ]]; then
            cp latest.json release-flat/
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-flat/*
          generateReleaseNotes: true
